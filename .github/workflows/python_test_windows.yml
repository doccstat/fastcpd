name: python-test-windows

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'paper/**'
      - 'mkdocs.yml'

jobs:
  test_windows_python:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion') }}-${{ hashFiles('**/*.bzl', 'WORKSPACE', 'BUILD.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion') }}-
            ${{ runner.os }}-bazel-

      - name: Install dependencies
        run: python -m pip install -r requirements_lock.txt

      - name: Build wheel
        run: python setup.py bdist_wheel

      - name: Install wheel
        shell: pwsh
        run: python -m pip install (Get-Item dist\*.whl)

      - name: Run python tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tmp
          Copy-Item -Recurse -Force tests tmp\tests
          Set-Location tmp
          python -m pytest tests -m "not long" -v

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --exclude venv/,env/,.venv/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --exclude venv/,env/,.venv/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
